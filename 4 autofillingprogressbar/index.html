<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <div style="width:300px;height:20px;border:2px solid #000">
        <div id="bar" style="width:0;height:100%;background:green;"></div>
    </body>
            <script>
                const bar = document.getElementById("bar");
                let width = 0;
                const interval = setInterval(() => {
                    width += 2;
                    bar.style.width = width + '%';
                    if (width >= 100) clearInterval(interval);

                }, 100);
            </script>
</body>
</html>
