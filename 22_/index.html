<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .glitch {
            font-size: 5rem;
            font-weight: 900;
            color: #00ffff;
            text-transform: uppercase;
            position: relative;
            cursor: pointer;
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

        }
        .glitch::before{color:#ff00ff;animation: glitch1 0.8s infinite;}
        .glitch::after{color:#ffff00;animation:glitch2 0.6s infinite}
    @keyframes glitch1{0%,100%{transform:translate(0);}20%{transform: translate(-4px,4px);}}
     @keyframes glitch2{0%,100%{transform:translate(0);}40%{transform: translate(4px,-4px);}}
    </style>
</head>

<body>
    <div class="glitch" data-text="CYBERPUNK">CYBERPUNK</div>
    <script>
        const glitch=document.querySelector('.glitch');
        glitch.style.animation='none';
        setTimeout(() => {
            glitch.style.animation='';
            
        },10);
    </script>


</body>

</html>
