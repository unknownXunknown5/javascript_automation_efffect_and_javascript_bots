<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            align-items: center;
            justify-content: center;
            font-size:18px;
            font-weight: bold;
            border-radius: 20px;
            background:#111;
            font-family: Arial, sans-serif;

          #pulseBox{
            width:150px;
            height:150px;
            background:linear-gradient(45deg,#ff00ff,#00ff);
            color:white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size:18px;
            font-weight:bold;
            box-shadow:0 0 20px rgba(255, 0,255, 0.6)
          }
        }
    </style>
</head>
<body>
    <div id="pulseBox">PULSE BOT</div>

    <script>// when script adding last to body part then not necessary to write dom content loaded
       const box= document.getElementById("pulseBox");
       let scale=1;
       let growing=true;
       function pulse(){
        scale+=growing?0.01:-0.01;
        if(scale>1.3){
            growing=false;

        }
        if(scale<1.){
            growing=true;

        }
        box.style.transform=`scale(${scale})`;
        requestAnimationFrame(pulse);
       }
       pulse();
       
    </script>
    
</body>
</html>
