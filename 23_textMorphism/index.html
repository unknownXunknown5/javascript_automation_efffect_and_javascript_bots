<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Particle Text Morphing</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      height: 100vh;
      background: #0a001f;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Arial', sans-serif;
    }
    canvas {
      display: block;
    }
    .title {
      position: absolute;
      top: 40px;
      color: rgba(255,255,255,0.1);
      font-size: 1.2rem;
      letter-spacing: 3px;
    }
  </style>
</head>
<body>
  <div class="title">MOVE MOUSE OVER TEXT</div>
  <canvas id="canvas"></canvas>

 <script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  
  let width, height;
  let particles = [];
  let isHovering = false;
  let mouse = { x: null, y: null, radius: 150 }; // Tracks mouse position

  class Particle {
    constructor(x, y) {
      this.x = Math.random() * window.innerWidth; // Start at random screen position
      this.y = Math.random() * window.innerHeight;
      
      // Keep track of the original text coordinates safely
      this.baseX = x;
      this.baseY = y;
      
      this.vx = 0;
      this.vy = 0;
      this.size = Math.random() * 3.5 + 1.5;
      this.hue = 260 + Math.random() * 60;
    }

    update() {
      // Calculate distance between particle and mouse
      let dx = mouse.x - this.x;
      let dy = mouse.y - this.y;
      let distance = Math.hypot(dx, dy);
      
      let targetX = this.baseX;
      let targetY = this.baseY;

      // Explode effect: Push away if the mouse gets too close
      if (distance < mouse.radius) {
        let force = (mouse.radius - distance) / mouse.radius; // Stronger force closer to mouse
        let angle = Math.atan2(dy, dx);
        
        // Push the target destination away from the mouse
        targetX -= Math.cos(angle) * force * 300;
        targetY -= Math.sin(angle) * force * 300;
      }

      // Spring physics toward the target destination
      let ax = (targetX - this.x) * 0.08;
      let ay = (targetY - this.y) * 0.08;
      
      this.vx += ax;
      this.vy += ay;
      
      this.vx *= 0.85; // Damping/Friction
      this.vy *= 0.85;
      
      this.x += this.vx;
      this.y += this.vy;
    }

    draw() {
      ctx.save();
      ctx.globalAlpha = 0.9;
      ctx.fillStyle = `hsl(${this.hue}, 90%, 75%)`;
      ctx.shadowBlur = 12;
      ctx.shadowColor = `hsl(${this.hue}, 100%, 85%)`;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
  }

  function createTextParticles(text) {
    particles = [];
    
    ctx.font = 'bold 140px Arial';
    ctx.fillStyle = 'white';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    
    const x = width / 2;
    const y = height / 2;
    
    ctx.clearRect(0, 0, width, height); // Ensure canvas is clean before sampling
    ctx.fillText(text, x, y);
    
    const imageData = ctx.getImageData(0, 0, width, height);
    const data = imageData.data;
    
    for (let y = 0; y < height; y += 3) {
      for (let x = 0; x < width; x += 3) {
        const index = (y * width + x) * 4;
        if (data[index + 3] > 128) { 
          particles.push(new Particle(x, y));
        }
      }
    }
  }

  function animate() {
    // Semi-transparent background creates the elegant trail effect
    ctx.fillStyle = 'rgba(10, 0, 31, 0.15)';
    ctx.fillRect(0, 0, width, height);

    particles.forEach(p => {
      p.update();
      p.draw();
    });

    requestAnimationFrame(animate);
  }

  // Tracking real-time Mouse Coordinates
  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
  });

  // Clear mouse coords when it leaves canvas so particles snap back perfectly
  canvas.addEventListener('mouseleave', () => {
    mouse.x = null;
    mouse.y = null;
  });

  // Initialize
  window.addEventListener('resize', () => {
    resize();
    createTextParticles("MORPH");
  });

  resize();
  createTextParticles("MORPH");
  animate();
</script>
</body>
</html>
